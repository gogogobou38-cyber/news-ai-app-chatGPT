<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NewsAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #111111;
      --sub: #8e8e93;
      --border: #e5e5ea;
      --accent: #007aff;
      --tabbar: rgba(249, 249, 249, 0.94);
      --shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg: #000000;
      --card: #1c1c1e;
      --text: #ffffff;
      --sub: #8e8e93;
      --border: #38383a;
      --accent: #0a84ff;
      --tabbar: rgba(28, 28, 30, 0.94);
      --shadow: 0 1px 6px rgba(0, 0, 0, 0.35);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page { display: none; }
    .page.active { display: block; }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      max-width: 430px;
      margin: 0 auto;
      background: var(--tabbar);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 44px 14px 0;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .app-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .weather-center {
      flex: 1;
      text-align: center;
      cursor: pointer;
    }

    .weather-top {
      font-size: 15px;
      font-weight: 600;
    }

    .weather-loc {
      font-size: 10px;
      color: var(--sub);
      margin-top: 1px;
    }

    .edit-btn {
      border: none;
      background: none;
      color: var(--accent);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .tag-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 10px;
      scrollbar-width: none;
    }

    .tag-bar::-webkit-scrollbar { display: none; }

    .tag {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      background: var(--bg);
      color: #3a3a3c;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: .15s ease;
      white-space: nowrap;
    }

    [data-theme="dark"] .tag {
      color: #f2f2f7;
      background: #1c1c1e;
    }

    .tag.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .main {
      padding-top: 138px;
      padding-bottom: 85px;
      min-height: 100vh;
    }

    .articles {
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      animation: fadeUp .25s ease both;
    }

    .card:active { transform: scale(.985); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-img {
      height: 98px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      background: linear-gradient(135deg, #f2f2f7, #e5e5ea);
    }

    [data-theme="dark"] .card-img {
      background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
    }

    .card-body {
      padding: 8px 10px 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--accent);
      color: #fff;
      font-size: 8px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 8px;
      margin-bottom: 5px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      font-size: 11px;
      line-height: 1.45;
      color: var(--sub);
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--sub);
    }

    .save-btn {
      cursor: pointer;
      font-size: 14px;
      user-select: none;
    }

    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 430px;
      margin: 0 auto;
      background: var(--tabbar);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      padding: 8px 0 12px;
      cursor: pointer;
    }

    .tab-icon { font-size: 18px; }

    .tab-label {
      font-size: 9px;
      color: var(--sub);
    }

    .tab-item.active .tab-label {
      color: var(--accent);
    }

    .overlay {
      position: fixed;
      inset: 0;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
      z-index: 200;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform .28s ease;
    }

    .overlay.open {
      transform: translateX(0);
    }

    .overlay-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(242,242,247,.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 44px 14px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    [data-theme="dark"] .overlay-header {
      background: rgba(28,28,30,.94);
    }

    .back-btn {
      font-size: 24px;
      color: var(--accent);
      cursor: pointer;
      user-select: none;
    }

    .overlay-ttl {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .overlay-save {
      font-size: 16px;
      cursor: pointer;
    }

    .hero {
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: linear-gradient(135deg, #e5e5ea, #d1d1d6);
    }

    [data-theme="dark"] .hero {
      background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
    }

    .art-body {
      padding: 10px 14px;
    }

    .art-title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 5px;
    }

    .art-meta {
      font-size: 10px;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .art-lead {
      font-size: 11px;
      line-height: 1.65;
      border-left: 3px solid var(--accent);
      padding-left: 8px;
      margin-bottom: 10px;
    }

    .art-text {
      font-size: 11px;
      line-height: 1.7;
      color: #3a3a3c;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }

    [data-theme="dark"] .art-text {
      color: #d1d1d6;
    }

    .analysis {
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 10px;
      border-left: 3px solid var(--accent);
      margin-bottom: 10px;
    }

    .analysis-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .analysis-text {
      font-size: 10px;
      line-height: 1.55;
      color: #3a3a3c;
      white-space: pre-wrap;
    }

    [data-theme="dark"] .analysis-text {
      color: #d1d1d6;
    }

    .sources {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
    }

    .sources-title {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .source-item {
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .source-item:last-child {
      border-bottom: none;
    }

    .source-name {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .source-link {
      font-size: 10px;
      color: var(--sub);
      text-decoration: none;
    }

    .source-title {
      font-size: 10px;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 3px;
    }

    .chat-section {
      border-top: 1px solid var(--border);
      padding: 8px 14px 20px;
    }

    .chat-title {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .chat-msgs {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .bubble {
      padding: 6px 10px;
      border-radius: 14px;
      font-size: 10px;
      line-height: 1.45;
      max-width: 85%;
      white-space: pre-wrap;
    }

    .bubble.ai {
      background: var(--card);
      border: 1px solid var(--border);
      margin-right: 30px;
    }

    .bubble.user {
      background: var(--accent);
      color: #fff;
      margin-left: 30px;
      align-self: flex-end;
    }

    .chat-row {
      display: flex;
      gap: 6px;
    }

    .chat-inp {
      flex: 1;
      padding: 7px 10px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 11px;
      outline: none;
      font-family: inherit;
    }

    .chat-send {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    .settings-wrap {
      padding: 12px 14px 90px;
    }

    .settings-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .weather-card {
      background: linear-gradient(135deg, #007aff, #5ac8fa);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .wc-icon { font-size: 36px; }
    .wc-temp { font-size: 28px; font-weight: 200; }
    .wc-desc { font-size: 11px; opacity: .85; margin-top: 2px; }
    .wc-loc { font-size: 10px; opacity: .65; }

    .settings-section {
      background: var(--card);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .settings-section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 8px 12px 4px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }

    .settings-row:first-of-type { border-top: none; }

    .settings-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .settings-val {
      font-size: 11px;
      color: var(--sub);
    }

    .toggle {
      width: 40px;
      height: 24px;
      background: #34c759;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
    }

    .toggle.off {
      background: #8e8e93;
    }

    .toggle-knob {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
      transition: .18s ease;
    }

    .toggle.off .toggle-knob {
      right: 18px;
    }

    .empty {
      padding: 80px 20px;
      text-align: center;
      color: var(--sub);
      font-size: 12px;
    }

    .loading {
      padding: 30px 20px;
      text-align: center;
      color: var(--sub);
      font-size: 12px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.42);
      z-index: 300;
      display: none;
    }

    .modal-backdrop.open {
      display: block;
    }

    .modal {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 430px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform .25s ease;
    }

    .modal-backdrop.open .modal {
      transform: translateY(0);
    }

    .modal-head {
      padding: 16px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 17px;
      font-weight: 600;
    }

    .modal-close {
      font-size: 24px;
      color: var(--sub);
      cursor: pointer;
    }

    .modal-body {
      padding: 14px 16px;
      max-height: 68vh;
      overflow-y: auto;
    }

    .tags-edit {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tag-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 8px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 500;
      background: var(--card);
      border: 1px solid var(--border);
    }

    .handle {
      color: #c7c7cc;
      font-size: 10px;
    }

    .delete-chip {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: none;
      background: #ff3b30;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      outline: none;
      font-family: inherit;
    }

    .btn {
      padding: 8px 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .suggest-title {
      font-size: 10px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .suggests {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }

    .suggest {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      background: var(--bg);
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .muted-center {
      text-align: center;
      color: var(--sub);
      font-size: 11px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header" id="mainHeader">
    <div class="header-row">
      <div class="app-title">NewsAI</div>
      <div class="weather-center" onclick="switchTab('settings')">
        <div class="weather-top" id="headerWeather">☀️ 22°</div>
        <div class="weather-loc" id="headerLoc">大阪市</div>
      </div>
      <button class="edit-btn" onclick="openTagModal()">編集</button>
    </div>
    <div class="tag-bar" id="tagBar"></div>
  </div>

  <div class="main" id="mainArea">
    <div class="page active" id="homePage">
      <div class="articles" id="articlesList"></div>
    </div>

    <div class="page" id="searchPage">
      <div class="empty">検索機能はこれから追加できます</div>
    </div>

    <div class="page" id="savedPage">
      <div class="articles" id="savedList"></div>
    </div>

    <div class="page" id="settingsPage">
      <div class="settings-wrap">
        <div class="settings-title">設定</div>

        <div class="weather-card">
          <div class="wc-icon" id="settingsWeatherIcon">☀️</div>
          <div>
            <div class="wc-temp" id="settingsTemp">22°C</div>
            <div class="wc-desc" id="settingsDesc">快晴</div>
            <div class="wc-loc" id="settingsLoc">大阪市</div>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">表示</div>
          <div class="settings-row">
            <div class="settings-left"><span>🌙</span>ダークモード</div>
            <div class="toggle off" id="darkToggle" onclick="toggleDark()">
              <div class="toggle-knob"></div>
            </div>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">このアプリについて</div>
          <div class="settings-row">
            <div class="settings-left"><span>🤖</span>AIエンジン</div>
            <div class="settings-val">Gemini 2.5 Flash</div>
          </div>
          <div class="settings-row">
            <div class="settings-left"><span>📰</span>ニュースソース</div>
            <div class="settings-val">RSS + AI生成</div>
          </div>
          <div class="settings-row">
            <div class="settings-left"><span>✨</span>バージョン</div>
            <div class="settings-val">5.0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item active" id="tab-home" onclick="switchTab('home')">
      <div class="tab-icon">🏠</div>
      <div class="tab-label">ホーム</div>
    </div>
    <div class="tab-item" id="tab-search" onclick="switchTab('search')">
      <div class="tab-icon">🔍</div>
      <div class="tab-label">検索</div>
    </div>
    <div class="tab-item" id="tab-saved" onclick="switchTab('saved')">
      <div class="tab-icon">🔖</div>
      <div class="tab-label">保存済み</div>
    </div>
    <div class="tab-item" id="tab-settings" onclick="switchTab('settings')">
      <div class="tab-icon">⚙️</div>
      <div class="tab-label">設定</div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-header">
      <div class="back-btn" onclick="closeArticle()">‹</div>
      <div class="overlay-ttl" id="overlayTitleMini"></div>
      <div class="overlay-save" id="overlaySaveBtn" onclick="toggleCurrentSave()">🔖</div>
    </div>

    <div class="hero" id="articleHero">📰</div>

    <div class="art-body">
      <div class="badge" id="articleBadge">🤖 Gemini生成記事 · AI</div>
      <div class="art-title" id="articleTitle"></div>
      <div class="art-meta" id="articleMeta"></div>
      <div class="art-lead" id="articleLead"></div>
      <div class="art-text" id="articleBody"></div>

      <div class="analysis">
        <div class="analysis-title">🤖 AI分析・要点</div>
        <div class="analysis-text" id="articlePoints"></div>
      </div>
    </div>

    <div class="sources">
      <div class="sources-title">📎 参照ソース</div>
      <div id="articleSources"></div>
    </div>

    <div class="chat-section">
      <div class="chat-title">💬 この記事について質問する</div>
      <div class="chat-msgs" id="chatMsgs">
        <div class="bubble ai">この記事について気になることを入力してください。</div>
      </div>
      <div class="chat-row">
        <input class="chat-inp" id="chatInput" placeholder="何でも聞いてください…" />
        <button class="chat-send" onclick="sendLocalChat()">↑</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="tagModal" onclick="handleBackdrop(event)">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">タグを編集</div>
        <div class="modal-close" onclick="closeTagModal()">×</div>
      </div>

      <div class="modal-body">
        <div class="tags-edit" id="tagsEdit"></div>

        <div class="panel-title">新しいタグを追加</div>
        <div class="input-row">
          <input class="input" id="newTagInput" placeholder="例：イラン情勢、円安…" />
          <button class="btn" onclick="addTag()">追加</button>
        </div>

        <div class="suggest-title">おすすめタグ</div>
        <div class="suggests" id="suggests"></div>

        <div class="muted-center">ドラッグ並び替えは後から追加できます</div>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_TAGS = ["AI", "半導体", "経済", "日本"];
    const SUGGEST_TAGS = ["国内", "国際", "テクノロジー", "ビジネス", "半導体", "AI・人工知能", "宇宙開発", "株式市場", "円安", "エンタメ"];

    const ICONS = {
      "AI": "🤖",
      "半導体": "💻",
      "経済": "💹",
      "日本": "🇯🇵",
      "国内": "🏛",
      "国際": "🌏",
      "テクノロジー": "🧠",
      "ビジネス": "📈",
      "AI・人工知能": "🤖",
      "株式市場": "💹",
      "円安": "💴",
      "宇宙開発": "🚀",
      "エンタメ": "🎬"
    };

    const state = {
      tags: JSON.parse(localStorage.getItem("newsai_tags") || "null") || [...DEFAULT_TAGS],
      activeTag: JSON.parse(localStorage.getItem("newsai_active") || '"AI"'),
      cache: {},
      currentArticle: null,
      saved: JSON.parse(localStorage.getItem("newsai_saved") || "[]"),
      dark: localStorage.getItem("newsai_dark") === "true"
    };

    function escapeHtml(text = "") {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", state.dark ? "dark" : "light");
      document.getElementById("darkToggle").classList.toggle("off", !state.dark);
    }

    function toggleDark() {
      state.dark = !state.dark;
      localStorage.setItem("newsai_dark", String(state.dark));
      applyTheme();
    }

    function saveTags() {
      localStorage.setItem("newsai_tags", JSON.stringify(state.tags));
      localStorage.setItem("newsai_active", JSON.stringify(state.activeTag));
    }

    function normalizeTags() {
      if (!Array.isArray(state.tags) || state.tags.length === 0) {
        state.tags = [...DEFAULT_TAGS];
      }

      state.tags = state.tags
        .filter(tag => typeof tag === "string")
        .map(tag => tag.trim())
        .filter(Boolean);

      state.tags = [...new Set(state.tags)];

      if (state.tags.length === 0) {
        state.tags = [...DEFAULT_TAGS];
      }

      if (!state.tags.includes(state.activeTag)) {
        state.activeTag = state.tags[0];
      }

      saveTags();
    }

    function renderTags() {
      const bar = document.getElementById("tagBar");
      bar.innerHTML = "";

      state.tags.forEach(tag => {
        const el = document.createElement("div");
        el.className = "tag" + (tag === state.activeTag ? " active" : "");
        el.textContent = tag;
        el.onclick = () => {
          state.activeTag = tag;
          saveTags();
          renderTags();
          loadArticles(tag);
        };
        bar.appendChild(el);
      });
    }

    function getIcon(tag) {
      return ICONS[tag] || "📰";
    }

    async function loadArticles(tag) {
      const list = document.getElementById("articlesList");
      list.innerHTML = `<div class="loading">読み込み中…</div>`;

      try {
        const res = await fetch(`/api/news?tag=${encodeURIComponent(tag)}`);
        const data = await res.json();

        const topics = Array.isArray(data.topics) ? data.topics : [];

        const articles = topics.map((topic, index) => ({
          id: topic.id || `${tag}-${index + 1}`,
          tag: topic.tag || tag,
          icon: getIcon(topic.tag || tag),
          title: topic.title || `${tag}の話題`,
          summary: topic.summary || "",
          body: topic.body || "",
          points: topic.points || "",
          sources: topic.sources || [],
          time: "たった今"
        }));

        state.cache[tag] = articles;
        renderArticleCards(articles);
      } catch (e) {
        console.error(e);
        list.innerHTML = `<div class="empty">記事の取得に失敗しました</div>`;
      }
    }

    function renderArticleCards(items) {
      const list = document.getElementById("articlesList");

      if (!items.length) {
        list.innerHTML = `<div class="empty">表示できるトピックがありません</div>`;
        return;
      }

      list.innerHTML = "";

      items.forEach((item, index) => {
        const isSaved = state.saved.some(s => s.id === item.id);

        const el = document.createElement("div");
        el.className = "card";
        el.style.animationDelay = `${index * 60}ms`;
        el.innerHTML = `
          <div class="card-img">${item.icon}</div>
          <div class="card-body">
            <div class="badge">🤖 AI生成 · ${escapeHtml(item.tag)}</div>
            <div class="card-title">${escapeHtml(item.title)}</div>
            <div class="card-desc">${escapeHtml(item.summary || "")}</div>
            <div class="card-footer">
              <span>${item.time}</span>
              <span class="save-btn">${isSaved ? "🔖✓" : "🔖"}</span>
            </div>
          </div>
        `;

        el.querySelector(".save-btn").onclick = (ev) => {
          ev.stopPropagation();
          toggleSave(item);
          renderArticleCards(items);
        };

        el.onclick = () => openArticle(item);
        list.appendChild(el);
      });
    }

    function toggleSave(article) {
      const idx = state.saved.findIndex(s => s.id === article.id);
      if (idx >= 0) state.saved.splice(idx, 1);
      else state.saved.unshift(article);

      localStorage.setItem("newsai_saved", JSON.stringify(state.saved));
      renderSaved();

      if (state.currentArticle?.id === article.id) {
        document.getElementById("overlaySaveBtn").textContent =
          state.saved.some(s => s.id === article.id) ? "🔖✓" : "🔖";
      }
    }

    function toggleCurrentSave() {
      if (!state.currentArticle) return;
      toggleSave(state.currentArticle);
    }

    function renderSaved() {
      const list = document.getElementById("savedList");

      if (!state.saved.length) {
        list.innerHTML = `<div class="empty">保存した記事はまだありません</div>`;
        return;
      }

      list.innerHTML = "";

      state.saved.forEach((item, index) => {
        const el = document.createElement("div");
        el.className = "card";
        el.style.animationDelay = `${index * 60}ms`;
        el.innerHTML = `
          <div class="card-img">${item.icon || "📰"}</div>
          <div class="card-body">
            <div class="badge">🤖 AI生成 · ${escapeHtml(item.tag || "")}</div>
            <div class="card-title">${escapeHtml(item.title || "")}</div>
            <div class="card-desc">${escapeHtml(item.summary || "")}</div>
            <div class="card-footer">
              <span>${item.time || "保存済み"}</span>
              <span class="save-btn">🔖✓</span>
            </div>
          </div>
        `;

        el.querySelector(".save-btn").onclick = (ev) => {
          ev.stopPropagation();
          toggleSave(item);
        };

        el.onclick = () => openArticle(item);
        list.appendChild(el);
      });
    }

    function openArticle(article) {
      state.currentArticle = article;

      document.getElementById("overlayTitleMini").textContent = article.title;
      document.getElementById("articleHero").textContent = article.icon || "📰";
      document.getElementById("articleBadge").textContent = `🤖 Gemini生成記事 · ${article.tag}`;
      document.getElementById("articleTitle").textContent = article.title;
      document.getElementById("articleMeta").textContent = `NewsAI編集部 · ${new Date().toLocaleDateString("ja-JP")}`;
      document.getElementById("articleLead").textContent = article.summary || "要約はまだありません。";
      document.getElementById("articleBody").textContent = article.body || "本文はまだありません。";
      document.getElementById("articlePoints").textContent = article.points || "・ポイントはまだありません";
      document.getElementById("overlaySaveBtn").textContent =
        state.saved.some(s => s.id === article.id) ? "🔖✓" : "🔖";

      const sourcesWrap = document.getElementById("articleSources");
      sourcesWrap.innerHTML = "";

      (article.sources || []).forEach(src => {
        const div = document.createElement("div");
        div.className = "source-item";
        div.innerHTML = `
          <div class="source-name">${escapeHtml(src.name || "Source")}</div>
          <div class="source-title">${escapeHtml(src.title || "")}</div>
          <a class="source-link" href="${src.url || "#"}" target="_blank" rel="noopener">元記事を開く</a>
        `;
        sourcesWrap.appendChild(div);
      });

      document.getElementById("chatMsgs").innerHTML =
        `<div class="bubble ai">この記事について気になることを入力してください。</div>`;
      document.getElementById("chatInput").value = "";
      document.getElementById("overlay").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeArticle() {
      document.getElementById("overlay").classList.remove("open");
      document.body.style.overflow = "";
    }

    function sendLocalChat() {
      const input = document.getElementById("chatInput");
      const value = input.value.trim();
      if (!value) return;

      const wrap = document.getElementById("chatMsgs");

      const user = document.createElement("div");
      user.className = "bubble user";
      user.textContent = value;
      wrap.appendChild(user);

      const ai = document.createElement("div");
      ai.className = "bubble ai";
      const title = state.currentArticle?.title || "この記事";
      ai.textContent = `「${title}」については、今は簡易版です。次に本格的な記事チャット機能も追加できます。`;
      wrap.appendChild(ai);

      input.value = "";
    }

    function switchTab(tab) {
      ["home", "search", "saved", "settings"].forEach(name => {
        document.getElementById(`${name}Page`).classList.toggle("active", name === tab);
        document.getElementById(`tab-${name}`).classList.toggle("active", name === tab);
      });

      const isHome = tab === "home";
      document.getElementById("mainHeader").style.display = isHome ? "block" : "none";
      document.getElementById("mainArea").style.paddingTop = isHome ? "138px" : "0";

      if (tab === "saved") renderSaved();
    }

    function openTagModal() {
      renderTagEditor();
      document.getElementById("tagModal").classList.add("open");
    }

    function closeTagModal() {
      document.getElementById("tagModal").classList.remove("open");
      normalizeTags();
      renderTags();
      loadArticles(state.activeTag);
    }

    function handleBackdrop(e) {
      if (e.target.id === "tagModal") closeTagModal();
    }

    function renderTagEditor() {
      const tagsEdit = document.getElementById("tagsEdit");
      tagsEdit.innerHTML = "";

      state.tags.forEach((tag, idx) => {
        const el = document.createElement("div");
        el.className = "tag-chip";
        el.innerHTML = `
          <span class="handle">⠿</span>
          <span>${escapeHtml(tag)}</span>
          <button class="delete-chip">×</button>
        `;

        el.querySelector(".delete-chip").onclick = () => {
          if (state.tags.length === 1) return;

          const removed = state.tags[idx];
          state.tags.splice(idx, 1);

          if (state.activeTag === removed) {
            state.activeTag = state.tags[0] || DEFAULT_TAGS[0];
          }

          normalizeTags();
          renderTagEditor();
          renderTags();
          loadArticles(state.activeTag);
        };

        tagsEdit.appendChild(el);
      });

      const suggests = document.getElementById("suggests");
      suggests.innerHTML = "";

      SUGGEST_TAGS.filter(tag => !state.tags.includes(tag)).forEach(tag => {
        const el = document.createElement("div");
        el.className = "suggest";
        el.textContent = tag;
        el.onclick = () => {
          state.tags.push(tag);
          state.activeTag = tag;
          normalizeTags();
          renderTagEditor();
          renderTags();
          loadArticles(state.activeTag);
        };
        suggests.appendChild(el);
      });
    }

    function addTag() {
      const input = document.getElementById("newTagInput");
      const value = input.value.trim();

      if (!value || state.tags.includes(value)) return;

      state.tags.push(value);
      state.activeTag = value;
      input.value = "";

      normalizeTags();
      renderTagEditor();
      renderTags();
      loadArticles(state.activeTag);
    }

    function initWeatherMock() {
      document.getElementById("headerWeather").textContent = "☀️ 22°";
      document.getElementById("headerLoc").textContent = "大阪市";
      document.getElementById("settingsWeatherIcon").textContent = "☀️";
      document.getElementById("settingsTemp").textContent = "22°C";
      document.getElementById("settingsDesc").textContent = "快晴";
      document.getElementById("settingsLoc").textContent = "大阪市";
    }

    document.addEventListener("DOMContentLoaded", () => {
      normalizeTags();
      applyTheme();
      renderTags();
      renderSaved();
      initWeatherMock();
      loadArticles(state.activeTag);
    });
  </script>
</body>
</html>
